<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <img id="headerLogo" alt="Select" class="header-logo" />
    </div>
    <div class="header-center">
      <div class="header-titles">
        <h1>Organograma Select</h1>
        <span>Estrutura Organizacional</span>
      </div>
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="globalSearch" class="search-input" placeholder="Buscar colaborador, cargo, setor, cidade..." autocomplete="off" />
        <div id="searchDropdown" class="search-dropdown hidden"></div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="btnFullscreen" title="Tela cheia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
      <button class="btn-icon" id="btnExportPng" title="Exportar PNG">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <button class="btn-icon" id="btnPrint" title="Imprimir">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- TOOLBAR: ZOOM + EXPAND/COLLAPSE -->
  <div class="toolbar-bottom">
    <!-- Controles de árvore -->
    <div class="tree-controls">
      <button class="tree-btn" id="btnExpandAll" title="Expandir todos os ramos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="7 13 12 18 17 13"/>
          <polyline points="7 6 12 11 17 6"/>
        </svg>
        Expandir Tudo
      </button>
      <button class="tree-btn" id="btnCollapseAll" title="Recolher todos os ramos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="17 11 12 6 7 11"/>
          <polyline points="17 18 12 13 7 18"/>
        </svg>
        Recolher Tudo
      </button>
    </div>

    <!-- Divisor -->
    <div class="toolbar-divider"></div>

    <!-- Controles de zoom -->
    <div class="zoom-controls">
      <button class="zoom-btn" id="btnZoomIn" title="Zoom +">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <span id="zoomLabel" class="zoom-label">100%</span>
      <button class="zoom-btn" id="btnZoomOut" title="Zoom -">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <div class="zoom-divider"></div>
      <button class="zoom-btn" id="btnZoomReset" title="Centralizar / Reset zoom">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
      <img id="loadingLogo" alt="Select" class="loading-logo" />
      <div class="loading-bar"><div class="loading-progress"></div></div>
      <p>Carregando estrutura organizacional...</p>
    </div>
  </div>

  <!-- CANVAS PRINCIPAL -->
  <main class="canvas-container" id="canvasContainer">
    <div class="canvas-world" id="canvasWorld">
      <!-- Conexões SVG -->
      <svg id="connectionsSvg" class="connections-svg"></svg>
      <!-- Cards dos setores -->
      <div id="cardsLayer" class="cards-layer"></div>
    </div>
  </main>

  <!-- PAINEL LATERAL -->
  <aside id="sidePanel" class="side-panel">
    <button class="panel-close" id="panelClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div id="panelContent" class="panel-content"></div>
    <div class="panel-section" id="panelColaboradores" style="display:none">
      <h3 class="panel-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Equipe
      </h3>
      <div id="colaboradoresList" class="colaboradores-list"></div>
    </div>
  </aside>

  <!-- OVERLAY -->
  <div id="panelOverlay" class="panel-overlay hidden"></div>

  <script src="app.js"></script>
</body>
</html>
