<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organograma Select</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --p:#7B2FBE;--pdk:#5C1F96;--plt:#EDE4FA;--pmd:#D4B8F0;
  --cy:#00C2CB;--cdk:#008A91;--clt:#E0F7F8;
  --bg:#F7F4FC;--sf:#FFF;--sf2:#F0EAF9;--bd:#E2D5F5;
  --tx:#1A0A2E;--mt:#6B5B8E;--dm:#A090C0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:12px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--pmd);border-radius:3px}

/* HEADER */
.hdr{background:var(--sf);border-bottom:2px solid var(--bd);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(123,47,190,.07);gap:8px}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{height:28px}
.hdiv{width:1px;height:22px;background:var(--bd)}
.bsb{font-size:10px;color:var(--mt)}
.hdr-r{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.si{background:var(--plt);border:1.5px solid var(--pmd);border-radius:7px;padding:6px 11px;color:var(--tx);font-size:11px;font-family:inherit;outline:none;width:200px;transition:.15s border-color}
.si:focus{border-color:var(--p)}
.si::placeholder{color:var(--dm)}
.btn{background:var(--sf2);border:1.5px solid var(--bd);color:var(--mt);border-radius:7px;padding:6px 11px;cursor:pointer;font-size:11px;font-family:inherit;transition:.15s all;white-space:nowrap}
.btn:hover{background:var(--plt);color:var(--pdk)}
.btn.ac{background:var(--pdk);border-color:var(--pdk);color:#fff}
.btn.ac:hover{background:var(--p)}
.kpis{display:flex;gap:5px}
.kp{background:var(--plt);border:1.5px solid var(--pmd);border-radius:6px;padding:4px 10px;text-align:center}
.kpv{font-size:14px;font-weight:800;color:var(--pdk);line-height:1}
.kpl{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--mt);margin-top:1px}
.sync-b{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mt);white-space:nowrap}
.sync-d{width:7px;height:7px;border-radius:50%;background:var(--dm);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CANVAS */
.canvas{padding:18px 16px 60px;overflow:auto;height:calc(100vh - 52px)}
.two-col{display:flex;gap:28px;justify-content:center;align-items:flex-start;min-width:0}
.col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;max-width:750px}
.col-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-bottom:10px;padding:3px 14px;border-radius:20px;border:1.5px solid;white-space:nowrap}

/* CARD RAIZ — +10% */
.rc{border:2px solid;border-radius:12px;background:var(--sf);overflow:hidden;width:242px;cursor:pointer;transition:.18s all;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.rc:hover{transform:scale(1.025);box-shadow:0 4px 16px rgba(123,47,190,.12)}
.rc-s{height:4px}
.rc-b{display:flex;align-items:center;gap:10px;padding:11px 13px}
.rc-av{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2.5px solid;flex-shrink:0}
.rc-nm{font-weight:700;font-size:13px;color:var(--tx);line-height:1.3}
.rc-rg{font-size:10px;color:var(--mt);margin-top:2px}

/* CONECTOR */
.vc{width:2px;height:16px;background:var(--pmd);margin:0 auto}

/* GRID LV1 */
.lv1-grid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;width:100%}
.lv1-wrap{display:flex;flex-direction:column;min-width:163px;max-width:198px;flex:1}

/* CARD LV1 — +10% (base era min:148, max:180) */
.c1{border:2px solid;border-radius:10px;background:var(--sf);cursor:pointer;transition:.18s all;overflow:visible}
.c1:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.09)}
.c1.ina{opacity:.5;filter:grayscale(.5)}
.c1.fer{border-style:dashed}
.c1-s{height:3px;border-radius:10px 10px 0 0}
.c1-b{display:flex;align-items:center;gap:8px;padding:8px 10px 6px}
.c1-av{width:31px;height:31px;border-radius:50%;object-fit:cover;border:2px solid;flex-shrink:0}
.c1-nm{font-weight:700;font-size:11px;color:var(--tx);line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.c1-rg{font-size:9px;color:var(--mt);margin-top:1px}
.c1-f{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-top:1px solid var(--bd);background:var(--sf2);gap:4px;border-radius:0 0 10px 10px}
.c1-loc{font-size:9px;color:var(--mt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.xb{display:flex;align-items:center;gap:3px;font-size:9.5px;color:var(--p);background:var(--plt);border:1px solid var(--pmd);border-radius:20px;padding:2px 8px;cursor:pointer;font-family:inherit;font-weight:600;transition:.15s;flex-shrink:0;white-space:nowrap;line-height:1.3}
.xb:hover{background:var(--pmd)}
.xb.op{background:var(--clt);border-color:var(--cdk);color:var(--cdk)}
.ch{display:inline-block;transition:.2s transform;font-size:8px}
.ch.up{transform:rotate(180deg)}

/* PAINEL SUBORDINADOS */
.panel{display:none;background:var(--plt);border:1px solid var(--pmd);border-top:none;border-radius:0 0 10px 10px;padding:6px}
.panel.op{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.panel.op.single{grid-template-columns:1fr}
.panel.op.wide{grid-template-columns:1fr 1fr 1fr}

/* MINI CARD — +10% */
.mc{display:flex;align-items:center;gap:7px;padding:6px 8px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:.15s all;overflow:hidden}
.mc:hover{background:var(--plt);transform:translateX(2px)}
.mc.ina{opacity:.5}
.mc-av{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid}
.mc-nm{font-weight:600;font-size:10px;color:var(--tx);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.mc-rg{font-size:8.5px;color:var(--mt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp{font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;flex-shrink:0}

/* DRAWER — painel lateral de detalhes */
.drawer{position:fixed;top:0;right:-420px;width:400px;height:100vh;background:var(--sf);border-left:2px solid var(--bd);z-index:500;transition:.28s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.drawer.op{right:0;box-shadow:-6px 0 32px rgba(123,47,190,.14)}
.dc{position:absolute;top:12px;right:12px;background:var(--plt);border:1px solid var(--pmd);color:var(--pdk);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:1;transition:.15s}
.dc:hover{background:var(--pmd)}
.dh{padding:28px 22px 18px;text-align:center;position:relative}
.dav{width:76px;height:76px;border-radius:50%;object-fit:cover;border:3px solid;margin-bottom:10px}
.dnm{font-weight:800;font-size:16px;color:var(--tx);line-height:1.3}
.drg{font-size:12px;color:var(--mt);margin-top:4px;font-weight:500}
.dbadges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.db{display:inline-block;border-radius:20px;padding:3px 11px;font-size:10px;font-weight:700}
.dtot{margin-top:9px;font-size:11px;color:var(--mt)}
.dtot strong{font-size:19px;font-weight:900;color:var(--pdk)}

/* SEÇÕES DO DRAWER */
.ds{padding:0 20px 14px}
.dst{font-size:9px;text-transform:uppercase;letter-spacing:.9px;color:var(--pdk);font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--plt)}
.dr{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.di{font-size:13px;width:20px;flex-shrink:0;margin-top:1px}
.dl{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--dm);margin-bottom:2px}
.dv{font-size:13px;color:var(--tx);font-weight:500;word-break:break-word}
.ddiv{height:1px;background:var(--bd);margin:0 20px 14px}

/* CARDS DO DRAWER — gestor e subordinados, clicáveis */
.scard{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;background:var(--sf2);border:1.5px solid var(--bd);margin-bottom:7px;cursor:pointer;transition:.15s all;text-decoration:none}
.scard:hover{background:var(--plt);border-color:var(--pmd);transform:translateX(3px);box-shadow:0 2px 10px rgba(123,47,190,.1)}
.sav{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2.5px solid}
.sinfo{flex:1;min-width:0}
.snm{font-weight:700;font-size:13px;color:var(--tx);line-height:1.3}
.srg{font-size:10px;color:var(--mt);margin-top:2px}
.sarrow{font-size:14px;color:var(--pmd);flex-shrink:0;transition:.15s}
.scard:hover .sarrow{color:var(--p);transform:translateX(2px)}
.stag{border-radius:20px;padding:2px 8px;font-size:9px;font-weight:600;border:1px solid;white-space:nowrap;max-width:80px;text-align:center;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(90,50,150,.18);z-index:499;opacity:0;pointer-events:none;transition:.28s}
.ov.op{opacity:1;pointer-events:all}

/* FOOTER */
.ft{border-top:1px solid var(--bd);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;font-size:9px;color:var(--dm);background:var(--sf)}

/* LOADING / ERRO */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:var(--mt)}
.spinner{width:44px;height:44px;border:3px solid var(--plt);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.erro-box{background:#fff0f0;border:1.5px solid #f5c0c0;border-radius:12px;padding:20px 24px;text-align:center;max-width:440px;margin:40px auto}
.erro-box h3{color:#c0392b;margin-bottom:8px;font-size:15px}
.erro-box p{font-size:12px;color:#6B5B8E;margin-top:6px;line-height:1.6}
.erro-box code{background:#f8e8e8;padding:3px 8px;border-radius:4px;font-size:11px;word-break:break-all;display:inline-block;margin-top:4px}

@media(max-width:780px){
  .two-col{flex-direction:column;align-items:center}
  .kpis,.sync-b{display:none}
  .drawer{width:100%;right:-100%}
  .canvas{height:auto}
  .lv1-wrap{min-width:140px;max-width:170px}
}
</style>
</head>

const NAME_FIXES = {
  "Juvenal de Lima":"Juvenal Lima",
  "Karina Barros":"Heverton Fernandes",
  "Lucilene Pedro dos Santos":"Lucilene Pedro Dos Santos",
};

let DATA = [];

// ── Busca e processa dados ─────────────────────────────────────
async function fetchData() {
  if (SHEETS_URL === "COLE_SUA_URL_AQUI") { mostrarErroConfig(); return; }
  try {
    const res  = await fetch(SHEETS_URL);
    const json = await res.json();
    if (json.erro) throw new Error(json.erro);

    const nameSet = new Set(json.colaboradores.map(d => d.nm));
    json.colaboradores.forEach(d => {
      let gs = (d.gs || "").trim();
      if (!gs || gs === d.nm) { d.gs = ""; return; }
      if (nameSet.has(gs)) return;
      if (NAME_FIXES[gs] && nameSet.has(NAME_FIXES[gs])) { d.gs = NAME_FIXES[gs]; return; }
      if (gs.includes("/")) {
        const p = gs.split("/").map(x=>x.trim()).find(x=>nameSet.has(x));
        d.gs = p || ""; return;
      }
      const m = [...nameSet].find(n=>n.toLowerCase()===gs.toLowerCase());
      d.gs = m || "";
    });

    DATA = json.colaboradores;
    kids = {};
    DATA.forEach(d => {
      if (!kids[d.nm]) kids[d.nm] = [];
      if (d.gs) { if (!kids[d.gs]) kids[d.gs] = []; kids[d.gs].push(d); }
    });

    document.getElementById("kp-total").textContent  = DATA.length;
    document.getElementById("kp-ativos").textContent = DATA.filter(d=>d.st==="Ativo").length;

    const dot = document.getElementById("sync-dot");
    dot.style.background = "#10b981";
    const now = new Date();
    document.getElementById("sync-txt").textContent =
      "Atualizado " + now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

    ["srch","btn-exp","btn-col"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = false;
    });

    document.getElementById("loading").style.display = "none";
    document.getElementById("tree").style.display    = "flex";
    buildTree();

  } catch(err) {
    document.getElementById("sync-dot").style.background = "#ef4444";
    document.getElementById("sync-txt").textContent = "Erro ao carregar";
    if (!DATA.length) mostrarErro(err.message);
  }
}

function mostrarErroConfig() {
  document.getElementById("loading").innerHTML = `
    <div class="erro-box">
      <h3>⚙️ Configuração necessária</h3>
      <p>Abra o arquivo <strong>index.html</strong> em um editor de texto e substitua:</p>
      <code>COLE_SUA_URL_AQUI</code>
      <p>pela URL do seu Google Apps Script.</p>
    </div>`;
}
function mostrarErro(msg) {
  document.getElementById("loading").innerHTML = `
    <div class="erro-box">
      <h3>❌ Erro ao carregar dados</h3>
      <p>${msg}</p>
      <p>Verifique se a URL do Apps Script está correta.</p>
      <button onclick="fetchData()" style="margin-top:12px;padding:7px 18px;background:var(--p);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px">Tentar novamente</button>
    </div>`;
}

// ── Monta a árvore ─────────────────────────────────────────────
function countAll(nm) {
  return (kids[nm]||[]).reduce((a,k)=>a+1+countAll(k.nm), 0);
}

function buildTree() {
  const t = document.getElementById("tree");
  t.innerHTML = "";
  DATA.filter(d=>!d.gs).forEach(root => t.appendChild(buildCol(root)));
}

function buildCol(root) {
  const c   = gc(root.rg);
  const col = document.createElement("div"); col.className = "col";

  // label
  const lbl = document.createElement("div"); lbl.className = "col-lbl";
  const cs = {
    "Superintendência de Expansão de Rede": {bg:"#EDE4FA",bd:"#D4B8F0",c:"#5C1F96"},
    "Superintendência Operacional":          {bg:"#E5DDF5",bd:"#C8A8EC",c:"#3D1470"},
  };
  const st = cs[root.rg] || {bg:"var(--plt)",bd:"var(--pmd)",c:"var(--pdk)"};
  lbl.style.cssText = `background:${st.bg};border-color:${st.bd};color:${st.c}`;
  lbl.textContent   = root.nm + " — " + root.rg;
  col.appendChild(lbl);

  // card raiz
  const rc = document.createElement("div"); rc.className = "rc"; rc.style.borderColor = c;
  rc.dataset.nm = root.nm;
  rc.innerHTML = `
    <div class="rc-s" style="background:${c}"></div>
    <div class="rc-b">
      <img class="rc-av" src="${av(root.nm,c)}" style="border-color:${c}" alt="">
      <div><div class="rc-nm">${root.nm}</div><div class="rc-rg">${root.rg}</div></div>
    </div>`;
  rc.onclick = () => openD(root);
  col.appendChild(rc);

  const vc = document.createElement("div"); vc.className = "vc"; col.appendChild(vc);

  // grid lv1
  const grid = document.createElement("div"); grid.className = "lv1-grid";
  (kids[root.nm]||[]).forEach(lv1 => {
    const c1   = gc(lv1.rg);
    const subs = kids[lv1.nm]||[];
    const hk   = subs.length > 0;
    const ss   = SS[lv1.st] || SS["Ativo"];
    const tot  = countAll(lv1.nm);
    const xid  = "xb-" + lv1.nm.replace(/[^a-zA-Z0-9]/g,"_");
    const pid  = "panel-" + lv1.nm.replace(/[^a-zA-Z0-9]/g,"_");

    const wrap = document.createElement("div"); wrap.className = "lv1-wrap";

    // card lv1
    const card = document.createElement("div");
    card.className = "c1" + (lv1.st==="Inativo"?" ina":"") + (lv1.st==="Férias"?" fer":"");
    card.dataset.nm = lv1.nm;
    card.style.borderColor = c1;
    const spill = lv1.st!=="Ativo"
      ? `<span class="sp" style="background:${ss.bg};color:${ss.c};border:1px solid ${ss.b}">${lv1.st}</span>`
      : "";
    const areaTag = lv1.area
      ? `<span style="font-size:8.5px;color:${c1};background:${c1}15;border:1px solid ${c1}33;padding:1px 6px;border-radius:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px" title="${lv1.area}">${lv1.area}</span>`
      : `<span style="font-size:8.5px;color:var(--dm)">${lv1.uf}</span>`;

    card.innerHTML = `
      <div class="c1-s" style="background:${c1}"></div>
      <div class="c1-b">
        <img class="c1-av" src="${av(lv1.nm,c1)}" style="border-color:${c1}" alt="">
        <div style="min-width:0">
          <div class="c1-nm">${lv1.nm}</div>
          <div class="c1-rg">${lv1.rg}</div>
          ${spill}
        </div>
      </div>
      <div class="c1-f">
        <span class="c1-loc">${lv1.cid||lv1.uf}</span>
        ${hk
          ? `<button class="xb" id="${xid}">${tot} pessoa${tot>1?"s":""} <span class="ch">▼</span></button>`
          : areaTag
        }
      </div>`;

    // clique no card abre drawer; clique no botão expande painel
    card.onclick = e => { if (!e.target.closest(".xb")) openD(lv1); };

    // painel de subordinados
    const panel = document.createElement("div");
    panel.id = pid;
    panel.className = "panel" + (subs.length===1?" single":"") + (subs.length>8?" wide":"");
    panel.style.borderColor = c1;

    subs.forEach(sub => {
      const cs2 = gc(sub.rg);
      const ss2 = SS[sub.st] || SS["Ativo"];
      const mc  = document.createElement("div");
      mc.className  = "mc" + (sub.st==="Inativo"?" ina":"");
      mc.dataset.nm = sub.nm;
      mc.style.borderColor = cs2;
      const stag2 = sub.st!=="Ativo"
        ? `<span class="sp" style="background:${ss2.bg};color:${ss2.c};border:1px solid ${ss2.b}">${sub.st}</span>`
        : "";
      mc.innerHTML = `
        <img class="mc-av" src="${av(sub.nm,cs2)}" style="border-color:${cs2}" alt="">
        <div style="min-width:0;flex:1">
          <div class="mc-nm">${sub.nm}</div>
          <div class="mc-rg">${sub.rg}</div>
        </div>
        ${stag2}`;
      mc.onclick = () => openD(sub);
      panel.appendChild(mc);
    });

    wrap.appendChild(card);
    if (hk) {
      wrap.appendChild(panel);
      const xb = card.querySelector("#" + xid);
      if (xb) xb.onclick = e => {
        e.stopPropagation();
        const op = panel.classList.toggle("op");
        xb.classList.toggle("op", op);
        const ch = xb.querySelector(".ch"); if (ch) ch.classList.toggle("up", op);
        if (op) setTimeout(()=>panel.scrollIntoView({behavior:"smooth",block:"nearest"}), 50);
      };
    }
    grid.appendChild(wrap);
  });
  col.appendChild(grid);
  return col;
}

function expandAll() {
  document.querySelectorAll(".panel").forEach(p => {
    p.classList.add("op");
    const xb = document.getElementById("xb-" + p.id.replace("panel-",""));
    if (xb) { xb.classList.add("op"); const ch=xb.querySelector(".ch"); if(ch)ch.classList.add("up"); }
  });
}
function collapseAll() {
  document.querySelectorAll(".panel").forEach(p => {
    p.classList.remove("op");
    const xb = document.getElementById("xb-" + p.id.replace("panel-",""));
    if (xb) { xb.classList.remove("op"); const ch=xb.querySelector(".ch"); if(ch)ch.classList.remove("up"); }
  });
}

function doSearch() {
  const q = document.getElementById("srch").value.trim().toLowerCase();
  document.getElementById("clr").style.display = q ? "inline-block" : "none";
  if (!q) { document.querySelectorAll(".c1,.mc,.rc").forEach(n=>n.style.opacity=""); return; }
  const hits = new Set(DATA.filter(d=>
    d.nm.toLowerCase().includes(q) || d.rg.toLowerCase().includes(q) ||
    d.area.toLowerCase().includes(q) || d.cid.toLowerCase().includes(q)
  ).map(d=>d.nm));
  document.querySelectorAll(".mc").forEach(mc => {
    if (hits.has(mc.dataset.nm)) {
      const p = mc.closest(".panel");
      if (p && !p.classList.contains("op")) {
        p.classList.add("op");
        const xb = document.getElementById("xb-" + p.id.replace("panel-",""));
        if (xb) { xb.classList.add("op"); const ch=xb.querySelector(".ch"); if(ch)ch.classList.add("up"); }
      }
    }
  });
  document.querySelectorAll(".c1,.mc,.rc").forEach(n => {
    n.style.opacity = hits.has(n.dataset.nm) ? "1" : "0.15";
  });
}
function resetSearch() {
  document.getElementById("srch").value = "";
  document.getElementById("clr").style.display = "none";
  document.querySelectorAll(".c1,.mc,.rc").forEach(n=>n.style.opacity="");
}

// ── Drawer — painel de detalhes ────────────────────────────────
function openD(p) {
  const c     = gc(p.rg);
  const subs  = kids[p.nm] || [];
  const gestor = p.gs ? DATA.find(d=>d.nm===p.gs) : null;
  const tot   = countAll(p.nm);
  const ss    = SS[p.st] || SS["Ativo"];

  let h = `
    <div class="dh" style="background:${c}10;border-bottom:2px solid ${c}25">
      <img class="dav" src="${av(p.nm,c)}" style="border-color:${c}" alt="">
      <div class="dnm">${p.nm}</div>
      <div class="drg">${p.rg}</div>
      <div class="dbadges">
        <span class="db" style="background:${c}18;color:${c};border:1.5px solid ${c}44">${p.area||p.uf||p.rg}</span>
        <span class="db" style="background:${ss.bg};color:${ss.c};border:1.5px solid ${ss.b}">${p.st}</span>
      </div>
      ${tot > 0 ? `<div class="dtot"><strong>${tot}</strong> pessoa${tot>1?"s":""} sob sua gestão</div>` : ""}
    </div>

    <div class="ds" style="padding-top:14px">
      <div class="dst">Contato</div>
      ${p.em  ? `<div class="dr"><span class="di">✉️</span><div><div class="dl">E-mail</div><div class="dv">${p.em}</div></div></div>` : ""}
      ${p.tel ? `<div class="dr"><span class="di">📱</span><div><div class="dl">Telefone</div><div class="dv">${p.tel}</div></div></div>` : ""}
      ${p.cid ? `<div class="dr"><span class="di">📍</span><div><div class="dl">Localização</div><div class="dv">${p.cid} / ${p.uf}</div></div></div>` : ""}
      ${p.area? `<div class="dr"><span class="di">🗺️</span><div><div class="dl">Área de atuação</div><div class="dv">${p.area}</div></div></div>` : ""}
    </div>

    <div class="ddiv"></div>
    <div class="ds">
      <div class="dst">Gestor direto</div>
      ${gestor
        ? `<div class="scard" onclick="openD(DATA.find(d=>d.nm===${JSON.stringify(gestor.nm)}))">
             <img class="sav" src="${av(gestor.nm,gc(gestor.rg))}" style="border-color:${gc(gestor.rg)}" alt="">
             <div class="sinfo">
               <div class="snm">${gestor.nm}</div>
               <div class="srg">${gestor.rg}</div>
             </div>
             <span class="sarrow">›</span>
           </div>`
        : `<div style="font-size:12px;color:var(--dm);padding:4px 0">Topo da hierarquia</div>`
      }
    </div>`;

  // Subordinados diretos
  if (subs.length > 0) {
    h += `<div class="ddiv"></div>
    <div class="ds">
      <div class="dst">Equipe direta — ${subs.length} pessoa${subs.length>1?"s":""}</div>`;
    subs.forEach(s => {
      const cs2 = gc(s.rg);
      const ss2 = SS[s.st] || SS["Ativo"];
      const subsubs = countAll(s.nm);
      h += `
        <div class="scard" onclick="openD(DATA.find(d=>d.nm===${JSON.stringify(s.nm)}))">
          <img class="sav" src="${av(s.nm,cs2)}" style="border-color:${cs2}" alt="">
          <div class="sinfo" style="min-width:0">
            <div class="snm">${s.nm}</div>
            <div class="srg">${s.rg}</div>
          </div>
          ${s.st !== "Ativo"
            ? `<span style="font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;background:${ss2.bg};color:${ss2.c};border:1px solid ${ss2.b};flex-shrink:0">${s.st}</span>`
            : subsubs > 0
              ? `<span style="font-size:8px;color:var(--mt);flex-shrink:0">+${subsubs}</span>`
              : ""
          }
          <span class="sarrow">›</span>
        </div>`;
    });
    h += `</div>`;
  }

  h += `<div style="height:24px"></div>`;

  document.getElementById("dc").innerHTML = h;
  document.getElementById("drawer").classList.add("op");
  document.getElementById("ov").classList.add("op");
}

function closeD() {
  document.getElementById("drawer").classList.remove("op");
  document.getElementById("ov").classList.remove("op");
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeD(); });

// ── Inicia ─────────────────────────────────────────────────────
fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
